name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev
        
      - name: Test paths
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          echo "当前目录: $(pwd)"
          echo "=== 查找 dispatch.h ==="
          find . -name "dispatch.h" 2>/dev/null
          echo "=== 查找 dispatch 目录 ==="
          find . -type d -name "dispatch" 2>/dev/null
