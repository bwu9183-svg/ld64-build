name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev libblocksruntime-dev
        
      - name: Build ld64
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
          
          # 查找并修复所有包含 DISPATCH_APPLY_AUTO 的文件
          for f in $(grep -rl "DISPATCH_APPLY_AUTO" ld64/ 2>/dev/null); do
            echo "Fixing $f..."
            # 添加 DISPATCH_APPLY_AUTO 定义
            sed -i "1i #include <dispatch/dispatch.h>\n#ifndef DISPATCH_APPLY_AUTO\n#define DISPATCH_APPLY_AUTO (dispatch_get_global_queue(0, 0))\n#endif" "$f"
            # 将 Block 语法替换为 Lambda
            sed -i 's/, ^(/, [&](/g' "$f"
          done
          
          # 编译
          make -C libstuff -j$(nproc)
          make -C libmacho -j$(nproc)
          make -C ld64/src/3rd -j$(nproc)
          make -C ld64/src/mach_o -j$(nproc)
          make -C ld64 -j$(nproc) 2>&1 | tail -30
          
          if [ -f "ld64/ld64" ]; then
            echo "SUCCESS"
            cp ld64/ld64 /tmp/ld64
          elif [ -f "ld64/src/ld/ld" ]; then
            echo "SUCCESS"
            cp ld64/src/ld/ld /tmp/ld64
          else
            echo "FAILED"
            exit 1
          fi
      
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ld64-binary
          path: /tmp/ld64
          retention-days: 90
          if-no-files-found: warn
