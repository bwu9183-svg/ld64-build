name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev libblocksruntime-dev
        
      - name: Build ld64
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          
          # 配置
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
          
          # 修复 Block 捕获问题
          sed -i 's/dispatch_apply(_state.sections.size(), DISPATCH_APPLY_AUTO, ^/dispatch_apply(_state.sections.size(), DISPATCH_APPLY_AUTO, [&, this]^/g' ld64/src/ld/passes/order.cpp
          sed -i 's/dispatch_apply(state.sections.size(), DISPATCH_APPLY_AUTO, ^/dispatch_apply(state.sections.size(), DISPATCH_APPLY_AUTO, [\&]^/g' ld64/src/ld/passes/code_dedup.cpp
          
          # 编译
          make -C libstuff -j$(nproc)
          make -C libmacho -j$(nproc)
          make -C ld64/src/3rd -j$(nproc)
          make -C ld64/src/mach_o -j$(nproc)
          make -C ld64 -j$(nproc)
          
          # 检查结果
          if [ -f "ld64/ld64" ]; then
            echo "✅ ld64 编译成功！"
            cp ld64/ld64 /tmp/ld64
          elif [ -f "ld64/src/ld/ld" ]; then
            echo "✅ ld 编译成功！"
            cp ld64/src/ld/ld /tmp/ld64
          else
            echo "❌ ld64 未找到"
            exit 1
          fi
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ld64-binary
          path: /tmp/ld64
          retention-days: 90
          if-no-files-found: warn
