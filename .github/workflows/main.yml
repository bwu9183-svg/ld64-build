name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-14 \
            llvm-14 \
            libstdc++-11-dev \
            libdispatch-dev \
            libssl-dev \
            libplist-dev \
            git \
            cmake
          
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-14 100
      
      - name: Clone cctools-port
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
      
      - name: Build ld64
        run: |
          cd cctools-port/cctools
          
          # 编译库
          make -C ld64/src/3rd -j$(nproc) || true
          make -C ld64/src/mach_o -j$(nproc) || true
          
          # 编译 passes 库（跳过有问题的文件）
          cd ld64/src/ld/passes
          for f in branch_island.cpp branch_shim.cpp compact_unwind.cpp dtrace_dof.cpp dylibs.cpp got.cpp huge.cpp objc.cpp order.cpp tlvp.cpp stubs/stubs.cpp bitcode_bundle.cpp thread_starts.cpp inits.cpp objc_constants.cpp objc_stubs.cpp; do
            clang++ -D__DARWIN_UNIX03 -DLTO_SUPPORT -D__LITTLE_ENDIAN__=1 \
              -I../../../../include -I../../../../include/foreign \
              -I../../../../ld64/src -I../../../../ld64/src/abstraction \
              -I../../../../ld64/src/3rd -I../../../../ld64/src/3rd/include \
              -I../../../../ld64/src/ld -I../../../../ld64/src/ld/parsers \
              -I../../../../ld64/src/ld/passes -I../../../../ld64/src/mach_o \
              -DPROGRAM_PREFIX="\"aarch64-apple-darwin-\"" \
              -O3 -std=c++17 -fblocks -D__arm64__ \
              -Wno-everything \
              -c -o libPasses_la-${f%.cpp}.o $f 2>/dev/null || true
          done
          ar cr libPasses.a libPasses_la-*.o 2>/dev/null || true
          
          # 编译 ld64 主程序
          cd ../
          for f in FatFile.cpp InputFiles.cpp Mangling.cpp Options.cpp OutputFile.cpp PlatformSupport.cpp Resolver.cpp ResponseFiles.cpp Snapshot.cpp SymbolTable.cpp ld.cpp; do
            clang++ -D__DARWIN_UNIX03 -DLTO_SUPPORT -D__LITTLE_ENDIAN__=1 \
              -I../../../include -I../../../include/foreign \
              -I../../../ld64/src -I../../../ld64/src/abstraction \
              -I../../../ld64/src/3rd -I../../../ld64/src/3rd/include \
              -I../../../ld64/src/ld -I../../../ld64/src/ld/parsers \
              -I../../../ld64/src/ld/passes -I../../../ld64/src/mach_o \
              -DPROGRAM_PREFIX="\"aarch64-apple-darwin-\"" \
              -O3 -std=c++17 -fblocks -D__arm64__ \
              -Wno-everything \
              -c -o ld-${f%.cpp}.o $f 2>/dev/null || true
          done
          
          for f in debugline.c libcodedirectory.c; do
            clang -D__DARWIN_UNIX03 -DLTO_SUPPORT -D__LITTLE_ENDIAN__=1 \
              -I../../../include -I../../../include/foreign \
              -I../../../ld64/src -I../../../ld64/src/abstraction \
              -I../../../ld64/src/3rd -I../../../ld64/src/3rd/include \
              -I../../../ld64/src/ld -I../../../ld64/src/ld/parsers \
              -I../../../ld64/src/ld/passes -I../../../ld64/src/mach_o \
              -DPROGRAM_PREFIX="\"aarch64-apple-darwin-\"" \
              -O3 -Wno-everything \
              -c -o ld-${f%.c}.o $f 2>/dev/null || true
          done
          
          # 链接
          clang++ -o ld \
            ld-*.o \
            parsers/.libs/libParsers.a \
            passes/libPasses.a \
            ../mach_o/.libs/libmacho.a \
            ../3rd/.libs/libhelper.a \
            -lstdc++ -lpthread -ldl -lm \
            -ldispatch -lBlocksRuntime || true
          
          if [ -f "ld" ]; then
            cp ld ../ld64
            echo "✅ ld64 编译成功！"
          fi
      
      - name: Check build result
        run: |
          if [ -f "cctools-port/cctools/ld64/ld64" ]; then
            echo "✅ ld64 编译成功！"
            file cctools-port/cctools/ld64/ld64
          else
            echo "❌ ld64 编译失败"
            exit 1
          fi
      
      - name: Upload ld64 binary
        uses: actions/upload-artifact@v4
        with:
          name: ld64-linux-x86_64
          path: cctools-port/cctools/ld64/ld64
          retention-days: 90
