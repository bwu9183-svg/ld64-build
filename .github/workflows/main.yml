name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev libblocksruntime-dev
        
      - name: Build ld64
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
          
          # 用 Python 将 dispatch_apply 替换为普通 for 循环
          python3 -c "
          import os, re
          def fix_dispatch(content):
              content = re.sub(r'dispatch_apply\((\w+\.size\(\)), DISPATCH_APPLY_AUTO, \^\(size_t index\) \{', r'for (size_t index = 0; index < \1; index++) {', content)
              content = re.sub(r'\s*\}\);', ' }', content)
              return content
          for root, dirs, files in os.walk('ld64'):
              for f in files:
                  if f.endswith('.cpp') or f.endswith('.c'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'dispatch_apply' in content:
                          print('Fixing: ' + path)
                          with open(path, 'w') as fh:
                              fh.write(fix_dispatch(content))
          "
          
          make -C libstuff -j$(nproc)
          make -C libmacho -j$(nproc)
          make -C ld64/src/3rd -j$(nproc)
          make -C ld64/src/mach_o -j$(nproc)
          make -C ld64 -j$(nproc) 2>&1 | tail -30
          
          if [ -f "ld64/ld64" ]; then
            echo "SUCCESS"
            cp ld64/ld64 /tmp/ld64
          elif [ -f "ld64/src/ld/ld" ]; then
            echo "SUCCESS"
            cp ld64/src/ld/ld /tmp/ld64
          else
            echo "FAILED"
            exit 1
          fi
      
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ld64-binary
          path: /tmp/ld64
          retention-days: 90
          if-no-files-found: warn
