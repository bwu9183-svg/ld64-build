name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev libblocksruntime-dev python3
        
      - name: Build ld64
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
          
          # 使用 Python 精确修复 Block 语法
          python3 /dev/stdin << 'PYEOF'
          import re
          
          def fix_blocks(filepath):
              with open(filepath, 'r') as f:
                  content = f.read()
              
              # 添加 DISPATCH_APPLY_AUTO 定义
              header = '#ifndef DISPATCH_APPLY_AUTO\n#define DISPATCH_APPLY_AUTO ((dispatch_queue_priority_t)0)\n#endif\n\n'
              content = header + content
              
              # 将 Apple Block ^{ 替换为 Lambda [&]{
              content = content.replace(', ^(', ', [&](')
              
              with open(filepath, 'w') as f:
                  f.write(content)
              
              print(f"Fixed: {filepath}")
          
          fix_blocks('ld64/src/ld/passes/order.cpp')
          fix_blocks('ld64/src/ld/passes/code_dedup.cpp')
          PYEOF
          
          make -C libstuff -j$(nproc)
          make -C libmacho -j$(nproc)
          make -C ld64/src/3rd -j$(nproc)
          make -C ld64/src/mach_o -j$(nproc)
          make -C ld64 -j$(nproc) 2>&1 | tail -30
          
          if [ -f "ld64/ld64" ]; then
            echo "✅ ld64 编译成功！"
            cp ld64/ld64 /tmp/ld64
          elif [ -f "ld64/src/ld/ld" ]; then
            echo "✅ ld 编译成功！"
            cp ld64/src/ld/ld /tmp/ld64
          else
            echo "❌ ld64 未找到"
            exit 1
          fi
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ld64-binary
          path: /tmp/ld64
          retention-days: 90
          if-no-files-found: warn
