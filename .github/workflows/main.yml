name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-14 \
            llvm-14 \
            libstdc++-11-dev \
            libdispatch-dev \
            libssl-dev \
            libplist-dev \
            git \
            cmake
          
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-14 100
      
      - name: Clone cctools-port
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
      
      - name: Fix code_dedup.cpp block capture issue
        run: |
          cd cctools-port/cctools/ld64/src/ld/passes
          sed -i 's/std::unordered_map<const ld::Atom\*, const ld::Atom\*>::const_iterator pos;/__block std::unordered_map<const ld::Atom*, const ld::Atom*>::const_iterator pos;/g' code_dedup.cpp
          sed -i 's/for (ld::Fixup::iterator fit = atom->fixupsBegin()/__block ld::Fixup::iterator fit = atom->fixupsBegin()/g' code_dedup.cpp
      
      - name: Configure cctools
        run: |
          cd cctools-port/cctools
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
      
      - name: Build ld64
        run: |
          cd cctools-port/cctools
          make -C ld64 -j$(nproc)
      
      - name: Check build result
        run: |
          if [ -f "cctools-port/cctools/ld64/ld64" ]; then
            echo "✅ ld64 编译成功！"
            file cctools-port/cctools/ld64/ld64
          else
            echo "❌ ld64 编译失败"
            exit 1
          fi
      
      - name: Upload ld64 binary
        uses: actions/upload-artifact@v4
        with:
          name: ld64-linux-x86_64
          path: cctools-port/cctools/ld64/ld64
          retention-days: 90
