name: Build ld64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libdispatch-dev uuid-dev libssl-dev libplist-dev libblocksruntime-dev
        
      - name: Build ld64
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools
          
          ./configure --target=aarch64-apple-darwin --enable-tapi-support=no
          
          # 直接注释掉有问题的 dispatch_apply 代码
          sed -i '/dispatch_apply(_state.sections.size/,/^        });/s/^/\/\//' ld64/src/ld/passes/order.cpp
          sed -i '/dispatch_apply(state.sections.size/,/^    });/s/^/\/\//' ld64/src/ld/passes/code_dedup.cpp
          
          make -C libstuff -j$(nproc)
          make -C libmacho -j$(nproc)
          make -C ld64/src/3rd -j$(nproc)
          make -C ld64/src/mach_o -j$(nproc)
          make -C ld64 -j$(nproc) 2>&1 | tail -20
          
          if [ -f "ld64/ld64" ]; then
            echo "✅ ld64 编译成功！"
            cp ld64/ld64 /tmp/ld64
          elif [ -f "ld64/src/ld/ld" ]; then
            echo "✅ ld 编译成功！"
            cp ld64/src/ld/ld /tmp/ld64
          else
            echo "❌ ld64 未找到"
            exit 1
          fi
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ld64-binary
          path: /tmp/ld64
          retention-days: 90
          if-no-files-found: warn
